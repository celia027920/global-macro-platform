<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全球宏观平台</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.header{
    padding:40px 20px;
}

h1{
    font-size:36px;
}

.card{
    margin:20px;
    padding:20px;
    background:#1e293b;
    border-radius:12px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="header">
<h1>🌍 全球宏观平台</h1>
<p>Global Macro Platform</p>
</div>

<div class="card">
<h2>🇺🇸 美国</h2>
<p>GDP、CPI、利率、股市</p>
<button>查看详情</button>
</div>

<div class="card">
<h2>🇨🇳 中国</h2>
<p>GDP、CPI、利率、房地产</p>
<button>查看详情</button>
</div>

<div class="card">
<h2>🇯🇵 日本</h2>
<p>GDP、汇率、国债</p>
<button>查看详情</button>
</div>

</body>
</html>
